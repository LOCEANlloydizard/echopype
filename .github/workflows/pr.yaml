name: Test PR

on:
  pull_request:
    paths-ignore: ["**/docker.yaml", "docs"]
  workflow_dispatch:

env:
  NUM_WORKERS: 2

jobs:
  test_linux:
    name: ${{ matrix.python-version }}--ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      minio:
        image: cormorack/minioci:latest
        ports:
          - 9000:9000
      httpserver:
        image: cormorack/http:latest
        ports:
          - 8080:80
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: echo "PYTHON_VERSION=${{ matrix.python-version }}" >> $GITHUB_ENV
      - run: sed -i "/docker-compose/d" requirements-dev.txt
      - run: python -m pip install -r requirements-dev.txt
      - if: ${{ matrix.python-version == '3.12' }}
        run: python -m pip install pytest-github-actions-annotate-failures
      - run: python -m pip install -e ".[plot]"
      - run: python -m pip list
      - run: python .ci_helpers/docker/setup-services.py --deploy --data-only --http-server ${{ job.services.httpserver.id }}
      - run: curl http://localhost:8080/data/
      - if: contains(github.event.pull_request.title, '[all tests ci]')
        run: pytest -vvv -rx --numprocesses=${{ env.NUM_WORKERS }} --max-worker-restart=3 --cov=echopype --cov-report=xml --log-cli-level=WARNING --disable-warnings
      - if: ${{ !contains(github.event.pull_request.title, '[all tests ci]') }}
        run: python .ci_helpers/run-test.py --pytest-args="--log-cli-level=WARNING,-vvv,-rx,--numprocesses=${{ env.NUM_WORKERS }},--max-worker-restart=3,--disable-warnings"

      - uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          env_vars: RUNNER_OS,PYTHON_VERSION
          name: codecov-umbrella
          fail_ci_if_error: false

  test_windows:
    name: ${{ matrix.python-version }}--windows-latest
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip, setuptools, wheel
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Install Cython
        run: python -m pip install cython    
      - name: Install dev tools (no docker-compose)
        run: python -m pip install -r requirements-dev-no-docker-compose.txt
      - if: ${{ matrix.python-version == '3.12' }}
        run: python -m pip install pytest-github-actions-annotate-failures
      - run: python -m pip install -e ".[plot]"
      - run: python -m pip list
      - name: Download test data from GitHub Release (Windows only)
        shell: pwsh
        run: |
          $urls = @(
            "ad2cp", "azfp", "azfp6", "ea640", "ecs", "ek60", "ek60_calibrate_chunks",
            "ek60_missing_channel_power", "ek80", "ek80_bb_complex_multiplex", "ek80_bb_with_calibration",
            "ek80_duplicate_ping_times", "ek80_ext", "ek80_invalid_env_datagrams",
            "ek80_missing_sound_velocity_profile", "ek80_new", "ek80_sequence",
            "es60", "es70", "es80", "legacy_datatree"
          )
          foreach ($name in $urls) {
            $zip = "${name}.zip"
            Invoke-WebRequest -Uri "https://github.com/LOCEANlloydizard/echopype/releases/download/v0.1.0/$zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath ./echopype/test_data -Force
          }
      - if: contains(github.event.pull_request.title, '[all tests ci]')
        run: pytest -vvv -rx --numprocesses=${{ env.NUM_WORKERS }} --max-worker-restart=3 --cov=echopype --cov-report=xml --log-cli-level=WARNING --disable-warnings
      - if: ${{ !contains(github.event.pull_request.title, '[all tests ci]') }}
        run: python .ci_helpers/run-test.py --pytest-args="--log-cli-level=WARNING,-vvv,-rx,--numprocesses=${{ env.NUM_WORKERS }},--max-worker-restart=3,--disable-warnings"

      - uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          env_vars: RUNNER_OS,PYTHON_VERSION
          name: codecov-umbrella
          fail_ci_if_error: false
